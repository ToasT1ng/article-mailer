name: Publish to npm

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check version not already published
        id: version_check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view article-mailer@$VERSION version 2>/dev/null; then
            echo "Version $VERSION already published — skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION not yet published — proceeding."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.skip == 'false'
        # --dry-run: 실제 배포 없이 배포 시뮬레이션만 수행합니다.
        # 실제 배포를 원하면 --dry-run 플래그를 제거하세요.
        run: npm publish --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
