<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>[AI 데일리] {{formattedDate}} | 오늘의 AI 아티클 {{count}}선</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; margin: 0; padding: 20px; color: #333; }
    .container { max-width: 680px; margin: 0 auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 32px 40px; }
    .header h1 { color: #fff; margin: 0 0 4px; font-size: 22px; font-weight: 700; }
    .header p { color: #aab4d4; margin: 0; font-size: 14px; }
    .content { padding: 32px 40px; }
    .article { border-bottom: 1px solid #f0f0f0; padding-bottom: 28px; margin-bottom: 28px; }
    .article:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-impact { background: #fff0e6; color: #d4580a; }
    .badge-trend { background: #e8f0fe; color: #1a56db; }
    .badge-importance-상 { background: #fef2f2; color: #c0392b; }
    .badge-importance-중 { background: #fffbeb; color: #b7791f; }
    .badge-importance-하 { background: #f0fdf4; color: #16a34a; }
    .source { font-size: 12px; color: #888; }
    .read-time { font-size: 12px; color: #888; }
    .article h2 { margin: 0 0 8px; font-size: 18px; font-weight: 700; line-height: 1.4; }
    .article h2 a { color: #1a1a2e; text-decoration: none; }
    .article h2 a:hover { text-decoration: underline; }
    .one-liner { font-size: 14px; color: #555; font-style: italic; margin: 0 0 12px; }
    .body-text { font-size: 14px; color: #444; line-height: 1.7; margin: 0 0 14px; }
    .read-more { display: inline-block; padding: 7px 18px; background: #1a56db; color: #fff; border-radius: 6px; font-size: 13px; text-decoration: none; font-weight: 500; }
    .footer { background: #f9f9f9; padding: 24px 40px; text-align: center; font-size: 12px; color: #999; border-top: 1px solid #eee; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 AI 데일리</h1>
      <p>{{formattedDate}} | 오늘의 AI 아티클 {{count}}선</p>
    </div>
    <div class="content">
      {{#each items}}
      <div class="article">
        <div class="meta">
          {{#if article.category}}
          <span class="badge badge-{{article.category}}">{{article.category}}</span>
          {{/if}}
          <span class="badge badge-importance-{{importance}}">중요도 {{importance}}</span>
          <span class="source">{{article.source}}</span>
          <span class="read-time">· {{readTimeMin}}분</span>
        </div>
        <h2><a href="{{article.url}}">{{article.title}}</a></h2>
        <p class="one-liner">{{oneLiner}}</p>
        <p class="body-text">{{body}}</p>
        <a class="read-more" href="{{article.url}}">원문 읽기 →</a>
      </div>
      {{/each}}
    </div>
    <div class="footer">
      <p>article-mailer · 자동 생성된 뉴스레터입니다</p>
    </div>
  </div>
</body>
</html>
